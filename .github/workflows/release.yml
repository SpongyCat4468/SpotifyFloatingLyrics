name: Build and Release

on:
  push:
    branches: [main, master]
    tags: [ 'v*' ]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean SpotifyFloatingLyrics.spec

      # 步驟 1：上傳為 Artifact（保留在 Actions 頁面，方便除錯，90天後過期）
      - name: Upload artifact (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyFloatingLyrics
          path: dist/SpotifyFloatingLyrics.exe
          if-no-files-found: error

      # 步驟 2：上傳到 GitHub Release（僅當你推送「標籤（Tag）」時才會觸發）
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/SpotifyFloatingLyrics.exe
